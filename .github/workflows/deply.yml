name: Deploy to OpenShift

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install oc CLI
        run: |
          if ! command -v oc &> /dev/null; then
            echo "oc not found, downloading..."
            curl -LO https://mirror.openshift.com/pub/openshift-v4/clients/ocp/stable/openshift-client-linux.tar.gz
            tar xzf openshift-client-linux.tar.gz
            sudo mv oc /usr/local/bin/
            sudo mv kubectl /usr/local/bin/
          else
            echo "oc is already installed, skipping."
          fi

      - name: Login to OpenShift
        run: |
          oc login ${{ secrets.OPENSHIFT_SERVER }} \
            --token=${{ secrets.OPENSHIFT_TOKEN }} \
            --insecure-skip-tls-verify=true

      - name: Trigger new build
        run: |
          oc project cicd-demo
          # 빌드 시작 및 완료 대기
          oc start-build cicd-demo-app-git --follow

      - name: Trigger Deployment update
        run: |
          # 새 이미지를 반영하여 Pod을 새로 띄우도록 강제합니다.
          oc rollout latest deployment/cicd-demo-app-git

      - name: Verify rollout
        run: |
          # 배포 상태를 최종 확인합니다.
          oc rollout status deployment/cicd-demo-app-git
